<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Gaming | Login & Register</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #1C1C1C;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      margin: 0;
    }

    .container {
      background-color: #000000;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(156, 93, 217, 0.4);
      width: 400px;
      padding: 40px;
      text-align: center;
      transition: 0.4s;
    }

    .container:hover {
      box-shadow: 0 0 35px rgba(245, 183, 0, 0.5);
    }

    h2 {
      color: #F5B700;
      margin-bottom: 25px;
      font-weight: 700;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background-color: #1C1C1C;
      color: #FFFFFF;
      outline: none;
      transition: 0.3s;
    }

    .form-control:focus {
      border: 2px solid #9C5DD9;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary {
      background-color: #5C2E91;
    }

    .btn-primary:hover {
      background-color: #9C5DD9;
    }

    .btn-outline {
      border: 2px solid #007C82;
      color: #007C82;
      background: transparent;
    }

    .btn-outline:hover {
      background-color: #007C82;
      color: #fff;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      color: #888;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #333;
    }

    .divider:not(:empty)::before {
      margin-right: .75em;
    }

    .divider:not(:empty)::after {
      margin-left: .75em;
    }

    .google-btn {
      background-color: #FFFFFF;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 8px;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      font-weight: 500;
      transition: 0.3s;
    }

    .google-btn:hover {
      background-color: #F5B700;
      color: #000;
    }

    .google-btn img {
      width: 18px;
    }

    .switch {
      margin-top: 15px;
      font-size: 14px;
    }

    .switch a {
      color: #F5B700;
      text-decoration: none;
      font-weight: 600;
    }

    /* Animasi transisi login & register */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Login Form -->
  <div class="container" id="loginForm">
    <h2>Login ke MD Gaming</h2>
    <form>
      <input type="email" class="form-control" placeholder="Email" required>
      <input type="password" class="form-control" placeholder="Password" required>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <div class="divider">atau</div>
    <button class="google-btn">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="">
      Masuk dengan Google
    </button>

    <p class="switch">Belum punya akun? <a href="#" onclick="showRegister()">Daftar Sekarang</a></p>
  </div>

  <!-- Register Form -->
  <div class="container hidden" id="registerForm">
    <h2>Daftar Akun Baru</h2>
    <form>
      <input type="text" class="form-control" placeholder="Nama Lengkap" required>
      <input type="email" class="form-control" placeholder="Email" required>
      <input type="password" class="form-control" placeholder="Password" required>
      <button type="submit" class="btn btn-primary">Daftar</button>
    </form>

    <div class="divider">atau</div>
    <button class="google-btn">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="">
      Daftar dengan Google
    </button>

    <p class="switch">Sudah punya akun? <a href="#" onclick="showLogin()">Login di sini</a></p>
  </div>

  <script>
    function showRegister() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    }

    function showLogin() {
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
    }
  </script>

</body>
</html>
